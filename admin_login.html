{% extends 'base.html' %}
{% block title %}Admin Login — SmartHealth{% endblock %}
{% block content %}
<div class="container-sm page-section" style="max-width:480px">
  <div class="card">
    <div style="text-align:center;margin-bottom:28px">
      <div style="font-size:3rem;margin-bottom:12px">🔑</div>
      <h2 style="font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:700">Admin Panel</h2>
      <p style="color:var(--text-muted)">Developer / Administrator Access</p>
    </div>
    <form method="POST">
      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-control" value="admin" required>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" placeholder="admin123" required>
      </div>
      <button type="submit" class="btn btn-block btn-lg" style="background:var(--orange);color:white;">Login to Admin Panel →</button>
    </form>
    <div class="alert-box info mt-16"><div class="alert-icon">ℹ️</div><div class="alert-msg">Default: admin / admin123</div></div>
  </div>
</div>
{% endblock %}
